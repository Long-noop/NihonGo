<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Kanji Flashcards</title>
    <meta
      name="description"
      content="Bộ flashcard Hán tự tương tác với luyện viết, âm Hán Việt và từ vựng mẫu."
    />
    <meta name="theme-color" content="#ae3427" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="NihonGo" />
    <link rel="apple-touch-icon" href="asserts/samurai-192.png" />
    <link rel="manifest" href="manifest.json" />

    <link rel="stylesheet" href="asserts/styles.css" />

    <link rel="icon" href="asserts/samurai.png" type="image/png" />
  </head>
  <body>
    <div class="topbar">
      <div class="brand"><b>漢字</b> · Flashcards</div>

      <!-- ── Search ───────────────────────────────────────────────── -->
      <div class="search-wrap" id="searchWrap">
        <input
          id="searchInput"
          type="search"
          placeholder="Tìm kanji, âm HV…"
          autocomplete="off"
          aria-label="Tìm kiếm kanji"
        />
        <div class="search-dropdown" id="searchDropdown" hidden></div>
      </div>

      <!-- ── Review button ──────────────────────────────────────────── -->
      <button
        class="review-btn"
        id="reviewBtn"
        aria-label="Chế độ ôn tập"
      >On tap<span class="review-badge" id="reviewBadge" hidden>0</span></button>

      <button
        class="theme-toggle"
        id="themeToggle"
        aria-label="Đổi giao diện sáng / tối"
      >
        <svg
          id="iconSun"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.6"
          stroke-linecap="round"
        >
          <circle cx="12" cy="12" r="4" />
          <path
            d="M12 2v2M12 20v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2 12h2M20 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"
          />
        </svg>
        <svg
          id="iconMoon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.6"
          stroke-linecap="round"
          style="display: none"
        >
          <path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5Z" />
        </svg>
      </button>
    </div>

    <div class="stage">
      <div class="scene" id="scene">
        <div class="card" id="card">
          <!-- ── FRONT ── -->
          <div class="face front">
            <span class="corner tl"></span>
            <span class="corner br"></span>
            <div class="index-mark" id="indexMark"></div>

            <div class="kanji-wrapper">
              <!--
                kanji-svg-container: KanjiVG SVG injected here on render().
                This IS the kanji display — no text element beneath it.
              -->
              <div class="kanji-svg-container" id="kanjiSvgContainer">
                <div
                  class="kanji-placeholder"
                  id="kanjiPlaceholder"
                  aria-hidden="true"
                ></div>
              </div>
            </div>

            <div class="front-actions">
              <button
                class="stroke-btn"
                id="strokeBtn"
                aria-label="Xem luyện viết viết"
              >
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M12 20h9" />
                  <path
                    d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"
                  />
                </svg>
                Luyện viết
              </button>
              <div class="tap-hint">Chạm thẻ để xem nghĩa</div>
            </div>
          </div>

          <!-- ── BACK ── -->
          <div class="face back">
            <span class="corner tl"></span>
            <span class="corner br"></span>
            <div class="back-header">
              <div class="han-viet" id="hanViet">NHẤT</div>
              <div class="back-kanji-mini" id="miniKanji">一</div>
            </div>
            <div class="meaning" id="meaningText">Một, số một</div>
            <div class="divider"></div>
            <div class="examples-label">Từ vựng liên quan</div>
            <ul class="examples" id="examplesList"></ul>
          </div>
        </div>
      </div>

      <!-- Navigation -->
      <div class="controls">
        <button class="ctrl-btn" id="prevBtn" aria-label="Thẻ trước">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M15 18l-6-6 6-6" />
          </svg>
        </button>
        <button class="ctrl-btn primary" id="flipBtn" aria-label="Lật thẻ">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M17 2.1l4 4-4 4" />
            <path d="M3 12.9V11a4 4 0 0 1 4-4h14" />
            <path d="M7 21.9l-4-4 4-4" />
            <path d="M21 11.1V13a4 4 0 0 1-4 4H3" />
          </svg>
        </button>
        <button class="ctrl-btn" id="nextBtn" aria-label="Thẻ kế tiếp">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M9 18l6-6-6-6" />
          </svg>
        </button>
      </div>

      <!-- ── Review controls (hidden by default) ──────────────────── -->
      <div class="review-controls" id="reviewControls" hidden>
        <!-- Hàng nút lật thẻ (hiển thị khi chưa lật) -->
        <div class="review-flip-row" id="reviewFlipRow">
          <button class="review-flip-btn" id="reviewFlipBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 2.1l4 4-4 4"/>
              <path d="M3 12.9V11a4 4 0 0 1 4-4h14"/>
              <path d="M7 21.9l-4-4 4-4"/>
              <path d="M21 11.1V13a4 4 0 0 1-4 4H3"/>
            </svg>
            Lat the
          </button>
        </div>
        <!-- Hàng 4 nút chấm điểm (hiển thị sau khi lật) -->
        <div class="review-grade-row" id="reviewGradeRow" hidden>
          <button class="grade-btn again" id="gradeAgain" data-grade="0">
            Quen<small>Again</small>
          </button>
          <button class="grade-btn hard" id="gradeHard" data-grade="1">
            Kho<small>Hard</small>
          </button>
          <button class="grade-btn good" id="gradeGood" data-grade="2">
            Tot<small>Good</small>
          </button>
          <button class="grade-btn easy" id="gradeEasy" data-grade="3">
            De<small>Easy</small>
          </button>
        </div>
        <!-- Tiến trình ôn tập -->
        <div class="review-progress" id="reviewProgress"></div>
      </div>

      <!-- ── Review complete screen ────────────────────────────────── -->
      <div class="review-complete" id="reviewComplete" hidden>
        <div class="review-complete-icon">&#x2713;</div>
        <div class="review-complete-title">Hoan thanh on tap hom nay!</div>
        <div class="review-complete-sub" id="reviewCompleteStats">Ban da on xong tat ca cac the.</div>
        <button class="review-back-btn" id="reviewBackBtn">Quay lai duyet</button>
      </div>

      <div class="progress">
        <b id="posNow">1</b> / <span id="posTotal">6</span>
      </div>
      <div class="page-label" id="pageLabel">Trang 1 / 27</div>
      <div class="jump-controls">
        <label class="jump-field" for="cardJumpInput">
          <span>Thẻ</span>
          <input
            id="cardJumpInput"
            inputmode="numeric"
            pattern="[0-9]*"
            placeholder="1"
            aria-label="Nhập số thẻ"
          />
        </label>
        <label class="jump-field" for="pageJumpInput">
          <span>Trang</span>
          <input
            id="pageJumpInput"
            inputmode="numeric"
            pattern="[0-9]*"
            placeholder="1"
            aria-label="Nhập số trang"
          />
        </label>
        <button class="jump-btn" id="jumpBtn" type="button">Đi tới</button>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <script src="search.js"></script>
    <script src="srs.js"></script>
    <script>
      // ══════════════════════════════════════════════════════════════════
      //  STATE  (DATA được load động từ kanji-sample.json)
      // ══════════════════════════════════════════════════════════════════
      let DATA = [];
      let INDEX = []; // full search index from data/index.json
      let idx = 0;
      let pageNumber = 1;
      let pageTotal = 27;
      let flipped = false;
      let animating = false;
      let animTimers = [];

      // ── SRS / review state ────────────────────────────────────────────
      let appMode = 'browse';   // 'browse' | 'review'
      let reviewQueue = [];     // mảng item cần ôn hôm nay
      let reviewPos = 0;        // vị trí hiện tại trong queue
      let reviewTotal = 0;      // tổng thẻ khi bắt đầu phiên

      const svgCache = new Map(); // ch → raw SVG text (or null if not found)

      // ── DOM refs ──────────────────────────────────────────────────────
      const card = document.getElementById("card");
      const kanjiSvgCont = document.getElementById("kanjiSvgContainer");
      const kanjiPlaceholder = document.getElementById("kanjiPlaceholder");
      const miniKanji = document.getElementById("miniKanji");
      const hanViet = document.getElementById("hanViet");
      const meaningText = document.getElementById("meaningText");
      const examplesList = document.getElementById("examplesList");
      const indexMark = document.getElementById("indexMark");
      const posNow = document.getElementById("posNow");
      const posTotal = document.getElementById("posTotal");
      const pageLabel = document.getElementById("pageLabel");
      const progressFill = document.getElementById("progressFill");
      const strokeBtn = document.getElementById("strokeBtn");
      const cardJumpInput = document.getElementById("cardJumpInput");
      const pageJumpInput = document.getElementById("pageJumpInput");
      const jumpBtn = document.getElementById("jumpBtn");

      const reducedMotion = window.matchMedia(
        "(prefers-reduced-motion: reduce)",
      ).matches;

      // ── Review DOM refs ───────────────────────────────────────────────
      const reviewControls   = document.getElementById("reviewControls");
      const reviewFlipRow    = document.getElementById("reviewFlipRow");
      const reviewGradeRow   = document.getElementById("reviewGradeRow");
      const reviewProgress   = document.getElementById("reviewProgress");
      const reviewComplete   = document.getElementById("reviewComplete");
      const reviewCompleteStats = document.getElementById("reviewCompleteStats");
      const reviewBadge      = document.getElementById("reviewBadge");
      const browseControls   = document.querySelector(".controls");
      const jumpControls     = document.querySelector(".jump-controls");
      const progressEl       = document.querySelector(".progress");
      const pageProgressTrack= document.querySelector(".progress-track");
      const pageLabelEl      = document.getElementById("pageLabel");

      // ══════════════════════════════════════════════════════════════════
      //  KANJIVG FETCH  (unchanged from NihonGo/kanji.html approach)
      // ══════════════════════════════════════════════════════════════════

      function codepointHex(ch) {
        return Array.from(ch)
          .map((c) => c.codePointAt(0).toString(16).toLowerCase())
          .join("-");
      }

      function getDisplayKanji(item) {
        if (!item || typeof item.kanji !== "string") return "";
        return Array.from(item.kanji)[0] || "";
      }

      async function fetchKanjiSvg(ch) {
        if (svgCache.has(ch)) return svgCache.get(ch);
        const hex = codepointHex(ch);
        const candidates = [
          `./data/kanjivg/0${hex}.svg`,
          `./data/kanjivg/${hex}.svg`,
        ];
        for (const url of candidates) {
          try {
            const res = await fetch(url, { cache: "force-cache" });
            if (!res.ok) continue;
            const text = await res.text();
            svgCache.set(ch, text);
            return text;
          } catch {
            continue;
          }
        }
        svgCache.set(ch, null);
        return null;
      }

      // ══════════════════════════════════════════════════════════════════
      //  SVG BUILDER
      //  Parses the raw KanjiVG text and produces a clean SVG element
      //  whose paths are tagged as .stroke-static (fully visible, no anim).
      //  Returns { svg, paths } where paths is the NodeList of path elements.
      // ══════════════════════════════════════════════════════════════════

      function buildStaticSvg(svgText) {
        const doc = new DOMParser().parseFromString(svgText, "image/svg+xml");
        const orig = doc.documentElement;

        // Remove stroke-number text nodes entirely
        orig.querySelectorAll("text, tspan").forEach((el) => el.remove());

        const ns = "http://www.w3.org/2000/svg";
        const svg = document.createElementNS(ns, "svg");
        svg.setAttribute(
          "viewBox",
          orig.getAttribute("viewBox") || "0 0 109 109",
        );
        svg.setAttribute("preserveAspectRatio", "xMidYMid meet");

        // Copy all path elements, assigning the static class
        const paths = [...orig.querySelectorAll("path")];
        paths.forEach((p) => {
          const d = p.getAttribute("d");
          if (!d) return;
          const el = document.createElementNS(ns, "path");
          el.setAttribute("d", d);
          el.classList.add("stroke-static");
          svg.appendChild(el);
        });

        return svg;
      }

      // ══════════════════════════════════════════════════════════════════
      //  ANIMATION
      //  Works directly on the SVG that is already displayed as the kanji.
      //  Steps:
      //    1. Grab the existing .stroke-static paths.
      //    2. Insert .stroke-track clones behind each one (ghost guides).
      //    3. Set dashoffset = totalLength on each .stroke-static path.
      //    4. Animate them sequentially.
      //    5. When done, remove track clones and clear dasharray/dashoffset.
      // ══════════════════════════════════════════════════════════════════

      function clearAnimTimers() {
        animTimers.forEach((id) => clearTimeout(id));
        animTimers = [];
      }

      function playAnimation(svg) {
        const ns = "http://www.w3.org/2000/svg";
        const paths = [...svg.querySelectorAll(".stroke-static")];
        if (!paths.length) return;

        // Remove any lingering track clones from a previous run
        svg.querySelectorAll(".stroke-track").forEach((el) => el.remove());

        // Insert ghost tracks behind each path
        paths.forEach((path) => {
          const track = document.createElementNS(ns, "path");
          track.setAttribute("d", path.getAttribute("d"));
          track.classList.add("stroke-track");
          svg.insertBefore(track, path);
        });

        // Initialise all paths as invisible
        paths.forEach((el) => {
          let len = 200;
          try {
            len = el.getTotalLength();
          } catch {}
          el.style.transition = "none";
          el.style.strokeDasharray = len;
          el.style.strokeDashoffset = len;
          void el.getBoundingClientRect(); // force reflow
        });

        if (reducedMotion) {
          // Skip anim — just show everything immediately
          paths.forEach((el) => {
            el.style.strokeDashoffset = "0";
          });
          finishAnimation(svg, paths);
          return;
        }

        // Animate each path sequentially
        const PER_BASE = 240; // ms per 100px of path length
        const GAP = 110; // ms between strokes
        const MIN_DUR = 180;
        let cursor = 0;

        paths.forEach((el, i) => {
          let len = 200;
          try {
            len = el.getTotalLength();
          } catch {}
          const dur = Math.max(MIN_DUR, Math.round((len / 100) * PER_BASE));
          const delay = cursor + (i === 0 ? 0 : GAP);

          const tid = setTimeout(() => {
            el.style.transition = `stroke-dashoffset ${dur}ms linear`;
            el.style.strokeDashoffset = "0";
          }, delay);
          animTimers.push(tid);
          cursor += dur + (i === 0 ? 0 : GAP);
        });

        // After all strokes complete, clean up
        const finishId = setTimeout(
          () => finishAnimation(svg, paths),
          cursor + 500,
        );
        animTimers.push(finishId);
      }

      function finishAnimation(svg, paths) {
        animating = false;

        // Restore paths to normal (no dasharray — fully visible, crisp)
        paths.forEach((el) => {
          el.style.transition = "none";
          el.style.strokeDasharray = "";
          el.style.strokeDashoffset = "";
        });

        // Remove ghost tracks
        svg.querySelectorAll(".stroke-track").forEach((el) => el.remove());
      }

      // ══════════════════════════════════════════════════════════════════
      //  STROKE ORDER BUTTON HANDLER
      // ══════════════════════════════════════════════════════════════════

      function setStrokeBtnLabel(text) {
        strokeBtn.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"/>
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>${text}`;
      }

      async function handleStrokeOrder() {
        // If mid-animation, abort and restart
        if (animating) {
          clearAnimTimers();
          animating = false;
          const svg = kanjiSvgCont.querySelector("svg");
          if (svg) {
            // Clean up leftover anim state
            svg.querySelectorAll(".stroke-track").forEach((el) => el.remove());
            svg.querySelectorAll(".stroke-static").forEach((el) => {
              el.style.transition = "none";
              el.style.strokeDasharray = "";
              el.style.strokeDashoffset = "";
            });
          }
          // Brief pause so user can see the reset
          await new Promise((r) => setTimeout(r, 60));
        }

        // Make sure SVG is loaded (it should be from render(), but guard anyway)
        let svg = kanjiSvgCont.querySelector("svg");
        if (!svg) {
          // SVG not yet loaded — fetch it now
          const ch = getDisplayKanji(DATA[idx]);
          if (!ch) return;
          strokeBtn.classList.add("loading");
          strokeBtn.textContent = "⋯ đang tải";
          const svgText = await fetchKanjiSvg(ch);
          strokeBtn.classList.remove("loading");
          setStrokeBtnLabel(" Luyện viết");
          if (!svgText) return;
          svg = buildStaticSvg(svgText);
          kanjiPlaceholder.remove();
          kanjiSvgCont.appendChild(svg);
        }

        animating = true;
        playAnimation(svg);
      }

      // ══════════════════════════════════════════════════════════════════
      //  PAGE LOADER
      //  Loads one of the page JSON files instead of kanji-sample.json.
      // ══════════════════════════════════════════════════════════════════

      async function preloadPageSvgs(pageData = DATA) {
        if (!Array.isArray(pageData) || !pageData.length) return;
        const chars = pageData
          .map(getDisplayKanji)
          .filter(Boolean)
          .slice(0, 96);

        await Promise.allSettled(chars.map((ch) => fetchKanjiSvg(ch)));
      }

      async function loadPage(pageNo) {
        const safePage = Math.min(Math.max(1, pageNo), pageTotal);
        const url = `./data/pages/page-${safePage}.json`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const pageData = await res.json();
        DATA = Array.isArray(pageData) ? pageData : [];
        pageNumber = safePage;
        idx = 0;
        posTotal.textContent = DATA.length;
        pageLabel.textContent = `Trang ${pageNumber} / ${pageTotal}`;
        const nextUrl = new URL(window.location.href);
        nextUrl.searchParams.set("page", String(pageNumber));
        window.history.replaceState({}, "", nextUrl);
        void preloadPageSvgs(DATA);
        return DATA;
      }

      // ══════════════════════════════════════════════════════════════════
      //  CARD RENDER
      //  Loads and displays the KanjiVG SVG as the primary kanji glyph.
      // ══════════════════════════════════════════════════════════════════

      async function render() {
        const item = DATA[idx];
        const displayKanji = getDisplayKanji(item);

        // Back-face text content (sync, fast)
        miniKanji.textContent = item.kanji;
        hanViet.textContent = item.han_viet;
        meaningText.textContent = item.meaning;
        indexMark.textContent = String(idx + 1).padStart(2, "0");
        examplesList.innerHTML = item.examples
          .map(
            (ex) => `
        <li class="example-item">
          <div class="example-bar"></div>
          <div class="example-body">
            <div class="example-top">
              <span class="example-word">${ex.word}</span>
              <span class="example-hira">${ex.hiragana}</span>
            </div>
            <div class="example-meaning">${ex.meaning}</div>
          </div>
        </li>
      `,
          )
          .join("");
        posNow.textContent = idx + 1;
        pageLabel.textContent = `Trang ${pageNumber} / ${pageTotal}`;
        progressFill.style.width = ((idx + 1) / DATA.length) * 100 + "%";

        // Front-face: avoid any visible text placeholder; render KanjiVG directly.
        if (kanjiPlaceholder) {
          kanjiPlaceholder.style.display = "none";
        }
        kanjiSvgCont.classList.add("is-loading");
        kanjiSvgCont.innerHTML = "";

        if (!displayKanji) {
          kanjiSvgCont.classList.remove("is-loading");
          return;
        }

        const svgText = await fetchKanjiSvg(displayKanji);
        if (!svgText) {
          kanjiSvgCont.classList.remove("is-loading");
          return;
        }

        // Only update if we're still on the same card
        // (user might have navigated away while awaiting)
        if (getDisplayKanji(DATA[idx]) !== displayKanji) return;

        const svg = buildStaticSvg(svgText);
        kanjiSvgCont.innerHTML = "";
        kanjiSvgCont.appendChild(svg);
        kanjiSvgCont.classList.remove("is-loading");
      }

      // ══════════════════════════════════════════════════════════════════
      //  NAVIGATION
      // ══════════════════════════════════════════════════════════════════

      function abortAnimation() {
        if (!animating) return;
        clearAnimTimers();
        animating = false;
        const svg = kanjiSvgCont.querySelector("svg");
        if (svg) {
          svg.querySelectorAll(".stroke-track").forEach((el) => el.remove());
          svg.querySelectorAll(".stroke-static").forEach((el) => {
            el.style.transition = "none";
            el.style.strokeDasharray = "";
            el.style.strokeDashoffset = "";
          });
        }
      }

      function setFlipped(v) {
        flipped = v;
        card.classList.toggle("flipped", flipped);
      }

      async function go(delta) {
        abortAnimation();

        const nextIndex = idx + delta;
        if (nextIndex >= 0 && nextIndex < DATA.length) {
          idx = nextIndex;
          setFlipped(false);
          setTimeout(render, 90);
          return;
        }

        const targetPage = pageNumber + (delta > 0 ? 1 : -1);
        if (targetPage >= 1 && targetPage <= pageTotal) {
          try {
            await loadPage(targetPage);
            idx = delta > 0 ? 0 : DATA.length - 1;
            setFlipped(false);
            setTimeout(render, 90);
          } catch (err) {
            console.error("[kanji] Failed to load page data:", err);
          }
          return;
        }

        idx = (idx + delta + DATA.length) % DATA.length;
        setFlipped(false);
        setTimeout(render, 90);
      }

      function jumpToCard(cardNo) {
        const targetCard = Number(cardNo);
        if (
          !Number.isInteger(targetCard) ||
          targetCard < 1 ||
          targetCard > DATA.length
        ) {
          return;
        }
        idx = targetCard - 1;
        setFlipped(false);
        setTimeout(render, 90);
      }

      async function jumpToPage(pageNo) {
        const targetPage = Number(pageNo);
        if (
          !Number.isInteger(targetPage) ||
          targetPage < 1 ||
          targetPage > pageTotal
        ) {
          return;
        }
        try {
          await loadPage(targetPage);
          idx = 0;
          setFlipped(false);
          setTimeout(render, 90);
        } catch (err) {
          console.error("[kanji] Failed to jump to page data:", err);
        }
      }

      function handleJump() {
        const requestedCard = cardJumpInput.value.trim();
        const requestedPage = pageJumpInput.value.trim();

        if (requestedPage) {
          jumpToPage(requestedPage);
          pageJumpInput.value = "";
          return;
        }

        if (requestedCard) {
          jumpToCard(requestedCard);
          cardJumpInput.value = "";
        }
      }

      // ── Event listeners ───────────────────────────────────────────────

      strokeBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        handleStrokeOrder();
      });

      card.addEventListener("click", () => {
        abortAnimation();
        setFlipped(!flipped);
      });

      document.getElementById("flipBtn").addEventListener("click", (e) => {
        e.stopPropagation();
        abortAnimation();
        setFlipped(!flipped);
      });
      document.getElementById("prevBtn").addEventListener("click", (e) => {
        e.stopPropagation();
        go(-1);
      });
      document.getElementById("nextBtn").addEventListener("click", (e) => {
        e.stopPropagation();
        go(1);
      });
      jumpBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        handleJump();
      });
      cardJumpInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          handleJump();
        }
      });
      pageJumpInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          handleJump();
        }
      });

      // ══════════════════════════════════════════════════════════════════
      //  KEYBOARD
      // ══════════════════════════════════════════════════════════════════

      document.addEventListener("keydown", (e) => {
        if (e.code === "Space" || e.code === "Enter") {
          e.preventDefault();
          abortAnimation();
          if (appMode === 'review') {
            // Space/Enter lật thẻ trong review mode
            if (!flipped) {
              setFlipped(true);
              showReviewGradeButtons();
            }
          } else {
            setFlipped(!flipped);
          }
        }
        if (appMode === 'browse') {
          if (e.code === "ArrowRight") go(1);
          if (e.code === "ArrowLeft") go(-1);
        } else if (appMode === 'review' && flipped) {
          // Phím 1/2/3/4 → chấm điểm
          if (e.key === '1') submitGrade(0);
          if (e.key === '2') submitGrade(1);
          if (e.key === '3') submitGrade(2);
          if (e.key === '4') submitGrade(3);
        }
        if (e.key === "s" || e.key === "S") handleStrokeOrder();
      });

      // ══════════════════════════════════════════════════════════════════
      //  REVIEW MODE
      // ══════════════════════════════════════════════════════════════════

      /** Cập nhật badge số thẻ due trên nút Ôn tập */
      function updateReviewBadge() {
        if (!window.KanjiSRS || !INDEX.length) return;
        const state = KanjiSRS.loadState();
        const count = KanjiSRS.getDueCount(INDEX, state);
        if (count > 0) {
          reviewBadge.textContent = count > 99 ? '99+' : String(count);
          reviewBadge.removeAttribute('hidden');
        } else {
          reviewBadge.setAttribute('hidden', '');
        }
      }

      /** Hiện/ẩn 4 nút chấm điểm khi thẻ đã lật */
      function showReviewGradeButtons() {
        reviewFlipRow.setAttribute('hidden', '');
        reviewGradeRow.removeAttribute('hidden');
      }

      /** Reset về trạng thái "chưa lật" trong review */
      function resetReviewFlipState() {
        reviewFlipRow.removeAttribute('hidden');
        reviewGradeRow.setAttribute('hidden', '');
      }

      /** Cập nhật dòng tiến trình */
      function updateReviewProgress() {
        reviewProgress.innerHTML = `Tien trinh: <b>${reviewPos}</b> / <b>${reviewTotal}</b> the`;
      }

      /** Load thẻ ở vị trí reviewPos trong reviewQueue */
      async function loadReviewCard() {
        if (reviewPos >= reviewQueue.length) {
          // Hết queue
          showReviewComplete();
          return;
        }
        const item = reviewQueue[reviewPos];
        // Cần đổi trang nếu thẻ thuộc trang khác
        if (item.page !== pageNumber) {
          try {
            await loadPage(item.page);
          } catch (err) {
            console.error('[kanji] Review loadPage failed:', err);
          }
        }
        // Đặt idx đến đúng vị trí thẻ trong trang
        idx = item.i;
        setFlipped(false);
        resetReviewFlipState();
        updateReviewProgress();
        setTimeout(render, 90);
      }

      /** Vào chế độ ôn tập */
      async function enterReviewMode() {
        if (!window.KanjiSRS || !INDEX.length) {
          showEmptyNotice();
          return;
        }
        const state = KanjiSRS.loadState();
        const count = KanjiSRS.getDueCount(INDEX, state);
        if (count === 0) {
          showEmptyNotice();
          return;
        }
        reviewQueue = KanjiSRS.buildQueue(INDEX, state);
        reviewPos   = 0;
        reviewTotal = reviewQueue.length;
        appMode     = 'review';

        // Ẩn browse UI, hiện review UI
        browseControls.style.display = 'none';
        jumpControls.style.display   = 'none';
        progressEl.style.display     = 'none';
        pageProgressTrack.style.display = 'none';
        pageLabelEl.style.display    = 'none';
        reviewControls.removeAttribute('hidden');
        reviewComplete.setAttribute('hidden', '');

        await loadReviewCard();
      }

      /** Thoát khỏi chế độ ôn tập, quay về browse */
      function exitReviewMode() {
        appMode = 'browse';

        // Ẩn review UI, hiện browse UI
        reviewControls.setAttribute('hidden', '');
        reviewComplete.setAttribute('hidden', '');
        browseControls.style.display = '';
        jumpControls.style.display   = '';
        progressEl.style.display     = '';
        pageProgressTrack.style.display = '';
        pageLabelEl.style.display    = '';

        // Cập nhật badge
        updateReviewBadge();
      }

      /** Hiện màn hoàn thành ôn tập */
      function showReviewComplete() {
        reviewControls.setAttribute('hidden', '');
        reviewComplete.removeAttribute('hidden');
        reviewCompleteStats.textContent =
          `Ban da on xong ${reviewTotal} the trong phien nay.`;
        // Cập nhật badge (có thể còn thẻ learning quay lại)
        updateReviewBadge();
      }

      /** Chấm điểm thẻ hiện tại và chuyển sang thẻ tiếp */
      function submitGrade(grade) {
        if (!window.KanjiSRS) return;
        const item = reviewQueue[reviewPos];
        if (!item) return;

        const state   = KanjiSRS.loadState();
        const oldCard = KanjiSRS.getCard(state, item.id);
        const newCard = KanjiSRS.reviewCard(oldCard, grade);
        state[item.id] = newCard;
        KanjiSRS.saveState(state);

        reviewPos++;
        loadReviewCard();
      }

      /** Thông báo nhẹ "Chưa có thẻ nào cần ôn" */
      function showEmptyNotice() {
        // Xóa notice cũ nếu có
        const old = document.querySelector('.review-empty-notice');
        if (old) old.remove();

        const notice = document.createElement('div');
        notice.className = 'review-empty-notice';
        notice.textContent = 'Chua co the nao can on hom nay.';
        // Chèn vào dưới .stage
        document.querySelector('.stage').appendChild(notice);
        setTimeout(() => notice.remove(), 3000);
      }

      // Swipe
      let touchStartX = null;
      document.getElementById("scene").addEventListener(
        "touchstart",
        (e) => {
          touchStartX = e.touches[0].clientX;
        },
        { passive: true },
      );
      document.getElementById("scene").addEventListener(
        "touchend",
        (e) => {
          if (touchStartX === null) return;
          const dx = e.changedTouches[0].clientX - touchStartX;
          if (Math.abs(dx) > 50) go(dx < 0 ? 1 : -1);
          touchStartX = null;
        },
        { passive: true },
      );

      // ══════════════════════════════════════════════════════════════════
      //  THEME
      // ══════════════════════════════════════════════════════════════════
      const root = document.documentElement;
      const iconSun = document.getElementById("iconSun");
      const iconMoon = document.getElementById("iconMoon");
      // Ưu tiên giá trị đã lưu trong localStorage, fallback về prefers-color-scheme
      let theme = localStorage.getItem("nihongo_theme_v1") ||
        (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");

      function applyTheme() {
        root.setAttribute("data-theme", theme);
        iconSun.style.display = theme === "dark" ? "block" : "none";
        iconMoon.style.display = theme === "dark" ? "none" : "block";
      }
      document.getElementById("themeToggle").addEventListener("click", () => {
        theme = theme === "dark" ? "light" : "dark";
        localStorage.setItem("nihongo_theme_v1", theme);
        applyTheme();
      });

      // ══════════════════════════════════════════════════════════════════
      //  INDEX LOADER
      // ══════════════════════════════════════════════════════════════════

      async function loadIndex() {
        try {
          const res = await fetch("./data/index.json");
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          INDEX = await res.json();
          if (window.KanjiSearch) KanjiSearch.init(INDEX);
          wireSearch();
          // Cập nhật badge due-count sau khi index đã load
          updateReviewBadge();
        } catch (err) {
          console.warn("[kanji] Could not load search index:", err.message);
        }
      }

      // ══════════════════════════════════════════════════════════════════
      //  SEARCH UI
      // ══════════════════════════════════════════════════════════════════

      const searchInput = document.getElementById("searchInput");
      const searchDropdown = document.getElementById("searchDropdown");

      /** Read SRS status — delegates to KanjiSRS.getCard() */
      function getSrsStatus(cardId) {
        if (!window.KanjiSRS) return "new";
        const state = KanjiSRS.loadState();
        return KanjiSRS.getCard(state, cardId).status;
      }

      const SRS_LABELS = { new: "Mới", learning: "Đang học", review: "Cần ôn" };

      function renderDropdown(results) {
        if (!results.length) {
          searchDropdown.innerHTML =
            '<div class="search-empty">Không tìm thấy kết quả</div>';
          searchDropdown.removeAttribute("hidden");
          return;
        }
        searchDropdown.innerHTML = results
          .map((item, k) => {
            const status = getSrsStatus(item.id);
            const chipLabel = SRS_LABELS[status] || "Mới";
            const chipCls = status;
            return `
            <div class="search-item" data-k="${k}">
              <span class="si-kanji">${item.kanji}</span>
              <div class="si-body">
                <div class="si-top">${item.han_viet}</div>
                <div class="si-meaning">${item.meaning}</div>
              </div>
              <span class="si-chip ${chipCls}">${chipLabel}</span>
            </div>`;
          })
          .join("");

        // Click handler — jump to card
        searchDropdown.querySelectorAll(".search-item").forEach((el, k) => {
          el.addEventListener("click", () => {
            const item = results[k];
            closeSearch();
            // Navigate to the correct page then jump to the card index
            if (item.page === pageNumber) {
              jumpToCard(item.i + 1);
            } else {
              loadPage(item.page)
                .then(() => {
                  idx = item.i;
                  setFlipped(false);
                  setTimeout(render, 90);
                })
                .catch((err) =>
                  console.error("[kanji] Search jump failed:", err),
                );
            }
          });
        });

        searchDropdown.removeAttribute("hidden");
      }

      function closeSearch() {
        searchDropdown.setAttribute("hidden", "");
        searchInput.value = "";
      }

      function wireSearch() {
        let debounceTimer = null;

        searchInput.addEventListener("input", () => {
          clearTimeout(debounceTimer);
          debounceTimer = setTimeout(() => {
            const q = searchInput.value.trim();
            if (!q) {
              searchDropdown.setAttribute("hidden", "");
              return;
            }
            if (!window.KanjiSearch) return;
            const results = KanjiSearch.query(q, 50);
            renderDropdown(results);
          }, 150);
        });

        // Close dropdown on Escape
        searchInput.addEventListener("keydown", (e) => {
          if (e.key === "Escape") closeSearch();
        });

        // Close dropdown when clicking outside
        document.addEventListener("click", (e) => {
          if (!document.getElementById("searchWrap").contains(e.target)) {
            searchDropdown.setAttribute("hidden", "");
          }
        });

        // Prevent Space/Enter card-flip shortcut when typing in search
        searchInput.addEventListener("keydown", (e) => {
          if (e.code === "Space" || e.code === "Enter") e.stopPropagation();
        });
      }

      // ══════════════════════════════════════════════════════════════════
      //  BOOT — fetch JSON, then start app
      // ══════════════════════════════════════════════════════════════════
      async function init() {
        // Show loading hint inside the kanji area
        kanjiSvgCont.innerHTML = `<div class="kanji-placeholder" style="font-size:14px;color:var(--muted)">読み込み中…</div>`;

        const urlParams = new URLSearchParams(window.location.search);
        const requestedPage = Number(urlParams.get("page"));
        const initialPage =
          Number.isInteger(requestedPage) &&
          requestedPage >= 1 &&
          requestedPage <= pageTotal
            ? requestedPage
            : 1;

        // Load first page and search index in parallel
        const [pageResult] = await Promise.allSettled([
          loadPage(initialPage),
          loadIndex(),
        ]);

        if (pageResult.status === "rejected") {
          kanjiSvgCont.innerHTML = `<div style="font-size:13px;color:var(--accent);text-align:center;padding:8px">
             ⚠ Không tải được dữ liệu trang.<br>
             <span style="color:var(--muted);font-size:11px">${pageResult.reason?.message}</span>
           </div>`;
          console.error("[kanji] Failed to load page data:", pageResult.reason);
          return;
        }

        render();
      }

      // ── Review event listeners ─────────────────────────────────────────

      document.getElementById("reviewBtn").addEventListener("click", (e) => {
        e.stopPropagation();
        if (appMode === 'review') return; // đã ở review mode
        enterReviewMode();
      });

      document.getElementById("reviewFlipBtn").addEventListener("click", (e) => {
        e.stopPropagation();
        abortAnimation();
        setFlipped(true);
        showReviewGradeButtons();
      });

      // Event delegation cho 4 nút chấm điểm
      document.getElementById("reviewGradeRow").addEventListener("click", (e) => {
        const btn = e.target.closest(".grade-btn");
        if (!btn) return;
        e.stopPropagation();
        const grade = Number(btn.dataset.grade);
        submitGrade(grade);
      });

      document.getElementById("reviewBackBtn").addEventListener("click", (e) => {
        e.stopPropagation();
        exitReviewMode();
      });

      applyTheme();
      init();
    </script>

    <!-- ══════════════════════════════════════════════════════════════════ -->
    <!-- Service Worker Registration for PWA Support                       -->
    <!-- ══════════════════════════════════════════════════════════════════ -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("./sw.js")
            .then((registration) => {
              console.log(
                "[APP] Service Worker registered successfully:",
                registration,
              );
              console.log("[APP] ✓ App is now ready to work offline!");
            })
            .catch((error) => {
              console.error("[APP] Service Worker registration failed:", error);
            });
        });

        // Listen for controller change (SW update)
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          console.log("[APP] Service Worker updated and is now active");
        });
      } else {
        console.warn("[APP] Service Worker not supported in this browser");
      }
    </script>
  </body>
</html>
