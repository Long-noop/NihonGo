<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Kanji Flashcards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;700;900&family=Noto+Sans+JP:wght@400;500&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="asserts/styles.css" />
  </head>
  <body>
    <div class="topbar">
      <div class="brand"><b>漢字</b> · Flashcards</div>
      <button
        class="theme-toggle"
        id="themeToggle"
        aria-label="Đổi giao diện sáng / tối"
      >
        <svg
          id="iconSun"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.6"
          stroke-linecap="round"
        >
          <circle cx="12" cy="12" r="4" />
          <path
            d="M12 2v2M12 20v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2 12h2M20 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"
          />
        </svg>
        <svg
          id="iconMoon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.6"
          stroke-linecap="round"
          style="display: none"
        >
          <path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5Z" />
        </svg>
      </button>
    </div>

    <div class="stage">
      <div class="scene" id="scene">
        <div class="card" id="card">
          <div class="face front kanji-face">
            <span class="corner tl"></span>
            <span class="corner br"></span>
            <div class="index-mark" id="indexMark"></div>
            <div class="kanji-char" id="kanjiChar">一</div>
            <div class="tap-hint">Chạm để xem nghĩa</div>
          </div>
          <div class="face back">
            <div class="back-header">
              <div class="han-viet" id="hanViet">NHẤT</div>
              <div class="back-kanji-mini" id="miniKanji">一</div>
            </div>
            <div class="meaning" id="meaningText">Một, số một</div>
            <div class="divider"></div>
            <div class="examples-label">Từ vựng liên quan</div>
            <ul class="examples" id="examplesList"></ul>
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="ctrl-btn" id="prevBtn" aria-label="Thẻ trước">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M15 18l-6-6 6-6" />
          </svg>
        </button>
        <button class="ctrl-btn primary" id="flipBtn" aria-label="Lật thẻ">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M17 2.1l4 4-4 4" />
            <path d="M3 12.9V11a4 4 0 0 1 4-4h14" />
            <path d="M7 21.9l-4-4 4-4" />
            <path d="M21 11.1V13a4 4 0 0 1-4 4H3" />
          </svg>
        </button>
        <button class="ctrl-btn" id="nextBtn" aria-label="Thẻ kế tiếp">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M9 18l6-6-6-6" />
          </svg>
        </button>
      </div>

      <div class="progress">
        <b id="posNow">1</b> / <span id="posTotal">6</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <script>
      // ---- Data (mẫu trích từ sách — thay bằng fetch JSON thật khi tích hợp) ----
      const DATA = [
        {
          kanji: "一",
          han_viet: "NHẤT",
          meaning: "Một, số một",
          examples: [
            { word: "一日", hiragana: "いちにち", meaning: "Một ngày" },
            { word: "一番", hiragana: "いちばん", meaning: "Số một, tốt nhất" },
            {
              word: "一生懸命",
              hiragana: "いっしょうけんめい",
              meaning: "Hết sức, nỗ lực hết mình",
            },
            { word: "統一", hiragana: "とういつ", meaning: "Thống nhất" },
          ],
        },
        {
          kanji: "丁",
          han_viet: "ĐINH",
          meaning: "Can thứ tư; đơn vị đếm vật mỏng, khối phố",
          examples: [
            {
              word: "丁寧",
              hiragana: "ていねい",
              meaning: "Lịch sự, cẩn thận",
            },
            {
              word: "一丁目",
              hiragana: "いっちょうめ",
              meaning: "Khu phố số 1",
            },
            { word: "包丁", hiragana: "ほうちょう", meaning: "Dao làm bếp" },
          ],
        },
        {
          kanji: "七",
          han_viet: "THẤT",
          meaning: "Bảy",
          examples: [
            { word: "七月", hiragana: "しちがつ", meaning: "Tháng bảy" },
            {
              word: "七夕",
              hiragana: "たなばた",
              meaning: "Lễ Thất tịch (Tanabata)",
            },
            {
              word: "七五三",
              hiragana: "しちごさん",
              meaning: "Lễ Shichi-Go-San",
            },
          ],
        },
        {
          kanji: "三",
          han_viet: "TAM",
          meaning: "Ba",
          examples: [
            { word: "三月", hiragana: "さんがつ", meaning: "Tháng ba" },
            {
              word: "三角形",
              hiragana: "さんかっけい",
              meaning: "Hình tam giác",
            },
            {
              word: "三日",
              hiragana: "みっか",
              meaning: "Ba ngày, ngày mùng ba",
            },
          ],
        },
        {
          kanji: "上",
          han_viet: "THƯỢNG",
          meaning: "Trên, phía trên",
          examples: [
            { word: "上手", hiragana: "じょうず", meaning: "Giỏi, khéo léo" },
            { word: "上司", hiragana: "じょうし", meaning: "Cấp trên, sếp" },
            {
              word: "以上",
              hiragana: "いじょう",
              meaning: "Trở lên, như trên",
            },
          ],
        },
        {
          kanji: "下",
          han_viet: "HẠ",
          meaning: "Dưới, phía dưới",
          examples: [
            { word: "下手", hiragana: "へた", meaning: "Vụng, kém" },
            { word: "地下", hiragana: "ちか", meaning: "Tầng hầm, dưới đất" },
            { word: "下着", hiragana: "したぎ", meaning: "Đồ lót" },
          ],
        },
      ];

      let idx = 0;
      let flipped = false;

      const card = document.getElementById("card");
      const kanjiChar = document.getElementById("kanjiChar");
      const miniKanji = document.getElementById("miniKanji");
      const hanViet = document.getElementById("hanViet");
      const meaningText = document.getElementById("meaningText");
      const examplesList = document.getElementById("examplesList");
      const indexMark = document.getElementById("indexMark");
      const posNow = document.getElementById("posNow");
      const posTotal = document.getElementById("posTotal");
      const progressFill = document.getElementById("progressFill");

      posTotal.textContent = DATA.length;

      function render() {
        const item = DATA[idx];
        kanjiChar.textContent = item.kanji;
        miniKanji.textContent = item.kanji;
        hanViet.textContent = item.han_viet;
        meaningText.textContent = item.meaning;
        indexMark.textContent = String(idx + 1).padStart(2, "0");
        examplesList.innerHTML = item.examples
          .map(
            (ex) => `
      <li class="example-item">
        <span class="example-word">${ex.word}</span><span class="example-hira">${ex.hiragana}</span>
        <div class="example-meaning">${ex.meaning}</div>
      </li>
    `,
          )
          .join("");
        posNow.textContent = idx + 1;
        progressFill.style.width = ((idx + 1) / DATA.length) * 100 + "%";
      }

      function setFlipped(v) {
        flipped = v;
        card.classList.toggle("flipped", flipped);
      }

      function go(delta) {
        idx = (idx + delta + DATA.length) % DATA.length;
        setFlipped(false);
        // wait for flip-back before swapping content for a clean feel
        setTimeout(render, 90);
      }

      card.addEventListener("click", () => setFlipped(!flipped));

      document.getElementById("flipBtn").addEventListener("click", (e) => {
        e.stopPropagation();
        setFlipped(!flipped);
      });
      document.getElementById("prevBtn").addEventListener("click", (e) => {
        e.stopPropagation();
        go(-1);
      });
      document.getElementById("nextBtn").addEventListener("click", (e) => {
        e.stopPropagation();
        go(1);
      });

      document.addEventListener("keydown", (e) => {
        if (e.code === "Space" || e.code === "Enter") {
          e.preventDefault();
          setFlipped(!flipped);
        }
        if (e.code === "ArrowRight") {
          go(1);
        }
        if (e.code === "ArrowLeft") {
          go(-1);
        }
      });

      // swipe support (mobile)
      let touchStartX = null;
      const scene = document.getElementById("scene");
      scene.addEventListener(
        "touchstart",
        (e) => {
          touchStartX = e.touches[0].clientX;
        },
        { passive: true },
      );
      scene.addEventListener(
        "touchend",
        (e) => {
          if (touchStartX === null) return;
          const dx = e.changedTouches[0].clientX - touchStartX;
          if (Math.abs(dx) > 50) {
            go(dx < 0 ? 1 : -1);
          }
          touchStartX = null;
        },
        { passive: true },
      );

      // ---- Theme ----
      const root = document.documentElement;
      const iconSun = document.getElementById("iconSun");
      const iconMoon = document.getElementById("iconMoon");
      const prefersDark = window.matchMedia(
        "(prefers-color-scheme: dark)",
      ).matches;
      let theme = prefersDark ? "dark" : "light";

      function applyTheme() {
        root.setAttribute("data-theme", theme);
        iconSun.style.display = theme === "dark" ? "block" : "none";
        iconMoon.style.display = theme === "dark" ? "none" : "block";
      }
      document.getElementById("themeToggle").addEventListener("click", () => {
        theme = theme === "dark" ? "light" : "dark";
        applyTheme();
      });

      applyTheme();
      render();
    </script>
  </body>
</html>
